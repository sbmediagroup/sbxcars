name: Keep Render Awake

on:
  # GitHub Actions scheduled workflows use cron syntax. GitHub enforces
  # a minimum effective schedule of ~5 minutes; 1-minute intervals are
  # not reliably supported. For true 1-minute pings, use an external
  # uptime monitor (UptimeRobot, Pingdom, etc.) to call `workflow_dispatch`
  # or directly hit the staging URL.
  schedule:
    - cron: '*/5 * * * *' # every 5 minutes (minimum practical on GitHub)
  workflow_dispatch: {}
  push:
    branches:
      - main

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Curl staging URL
        continue-on-error: true
        run: |
          echo "Pinging sbxcars.onrender.com to keep instance awake"
          # Retry a few times and increase timeout to reduce intermittent failures
          curl -fsS --max-time 30 --retry 3 --retry-delay 5 --retry-connrefused https://sbxcars.onrender.com || echo 'Ping failed (non-fatal)'
